services:
  mcp-workspace:
    build:
      context: ./mcp_workspace
    container_name: mcp-workspace
    ports:
      - "8000:8000"
    environment:
      # Identifiants injectés depuis le .env
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      
      # Autorise le HTTP local sans SSL
      - OAUTHLIB_INSECURE_TRANSPORT=1
      - OAUTH2_ALLOW_INSECURE_TRANSPORT=true
      
      # Activation obligatoire du mode OAuth 2.1 pour le transport HTTP
      - MCP_ENABLE_OAUTH21=true
      
      # Configuration de la persistance des sessions OAuth
      - WORKSPACE_MCP_OAUTH_PROXY_STORAGE_BACKEND=disk
      - WORKSPACE_MCP_OAUTH_PROXY_DISK_DIRECTORY=/app/oauth_data
      
      # Chargement sélectif des outils (optimisation des tokens)
      - TOOLS=gmail docs drive
    volumes:
      # Volume pour éviter de se reconnecter à Google à chaque redémarrage
      - mcp_oauth_data:/app/oauth_data:rw

volumes:
  mcp_oauth_data: